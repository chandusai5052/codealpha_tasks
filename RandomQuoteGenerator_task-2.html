<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Random Quote Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.8s ease;
      padding: 2rem;
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 24px;
      padding: 3rem;
      max-width: 680px;
      width: 100%;
      text-align: center;
      position: relative;
      box-shadow: 0 25px 60px rgba(0,0,0,0.45);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .card.fade-out { opacity: 0; transform: translateY(14px) scale(0.97); }
    .card.fade-in  { opacity: 1; transform: translateY(0) scale(1); }

    .counter {
      position: absolute;
      top: 1.25rem;
      right: 1.5rem;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.05em;
    }

    .quote-icon {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 1rem;
      opacity: 0.2;
      color: #fff;
      font-family: Georgia, serif;
    }

    .category-tag {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      background: rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.45);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .quote-text {
      font-size: 1.4rem;
      font-weight: 400;
      font-style: italic;
      line-height: 1.75;
      color: #f1f5f9;
      margin-bottom: 2rem;
      letter-spacing: 0.01em;
    }

    .divider {
      width: 48px;
      height: 3px;
      border-radius: 2px;
      margin: 0 auto 1.25rem;
    }

    .quote-author {
      font-size: 0.95rem;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 26px;
      border-radius: 50px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: transform 0.2s, box-shadow 0.2s, background 0.8s;
    }

    .btn-primary {
      color: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.4); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-ghost {
      background: rgba(255,255,255,0.09);
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.13);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.16); color: #fff; }
    .btn-ghost:active { transform: scale(0.97); }
  </style>
</head>
<body>

  <div class="card fade-in" id="card">
    <span class="counter" id="counter">#1</span>
    <div class="quote-icon">"</div>
    <span class="category-tag" id="category"></span>
    <p class="quote-text" id="quoteText"></p>
    <div class="divider" id="divider"></div>
    <p class="quote-author">— <span id="author"></span></p>
    <div class="actions">
      <button class="btn btn-primary" id="newBtn" onclick="nextQuote()">✨ New Quote</button>
      <button class="btn btn-ghost" id="copyBtn" onclick="copyQuote()">📋 Copy</button>
    </div>
  </div>

  <script>
    const quotes = [
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs", category: "Motivation" },
      { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein", category: "Wisdom" },
      { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius", category: "Perseverance" },
      { text: "Life is what happens when you're busy making other plans.", author: "John Lennon", category: "Life" },
      { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt", category: "Dreams" },
      { text: "Spread love everywhere you go. Let no one ever come to you without leaving happier.", author: "Mother Teresa", category: "Kindness" },
      { text: "When you reach the end of your rope, tie a knot in it and hang on.", author: "Franklin D. Roosevelt", category: "Resilience" },
      { text: "Always remember that you are absolutely unique. Just like everyone else.", author: "Margaret Mead", category: "Humor" },
      { text: "Don't judge each day by the harvest you reap but by the seeds that you plant.", author: "Robert Louis Stevenson", category: "Wisdom" },
      { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb", category: "Action" },
      { text: "An unexamined life is not worth living.", author: "Socrates", category: "Philosophy" },
      { text: "You miss 100% of the shots you don't take.", author: "Wayne Gretzky", category: "Courage" },
      { text: "Whether you think you can or you think you can't, you're right.", author: "Henry Ford", category: "Mindset" },
      { text: "I have not failed. I've just found 10,000 ways that won't work.", author: "Thomas Edison", category: "Perseverance" },
      { text: "The only impossible journey is the one you never begin.", author: "Tony Robbins", category: "Motivation" },
      { text: "In three words I can sum up everything I've learned about life: it goes on.", author: "Robert Frost", category: "Life" },
      { text: "To be yourself in a world that is constantly trying to make you something else is the greatest accomplishment.", author: "Ralph Waldo Emerson", category: "Identity" },
      { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt", category: "Confidence" },
      { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill", category: "Courage" },
      { text: "Happiness is not something ready-made. It comes from your own actions.", author: "Dalai Lama", category: "Happiness" },
    ];

    const colors = [
      { bg: "linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)", accent: "#e94560" },
      { bg: "linear-gradient(135deg,#0d1b2a,#1b4332,#2d6a4f)", accent: "#52b788" },
      { bg: "linear-gradient(135deg,#1a0a2e,#2d1b69,#11998e)", accent: "#a78bfa" },
      { bg: "linear-gradient(135deg,#1a1a0d,#3d2b00,#7c4700)", accent: "#f59e0b" },
      { bg: "linear-gradient(135deg,#0d0d1a,#1e1e3f,#2d2d6b)", accent: "#60a5fa" },
      { bg: "linear-gradient(135deg,#1a0d0d,#3b1f1f,#7f1d1d)", accent: "#f87171" },
      { bg: "linear-gradient(135deg,#0d1a1a,#134e4a,#0f766e)", accent: "#2dd4bf" },
    ];

    let quoteIdx = -1;
    let colorIdx = -1;
    let count = 0;

    function getRandom(arr, exclude) {
      let idx;
      do { idx = Math.floor(Math.random() * arr.length); } while (arr.length > 1 && idx === exclude);
      return idx;
    }

    function applyQuote() {
      const q = quotes[quoteIdx];
      const c = colors[colorIdx];

      document.getElementById('quoteText').textContent = q.text;
      document.getElementById('author').textContent = q.author;
      document.getElementById('author').style.color = c.accent;
      document.getElementById('category').textContent = q.category;
      document.getElementById('divider').style.background = c.accent;
      document.getElementById('newBtn').style.background = c.accent;
      document.getElementById('counter').textContent = '#' + count;
      document.body.style.background = c.bg;
    }

    function nextQuote() {
      const card = document.getElementById('card');
      card.classList.remove('fade-in');
      card.classList.add('fade-out');

      setTimeout(() => {
        quoteIdx = getRandom(quotes, quoteIdx);
        colorIdx = getRandom(colors, colorIdx);
        count++;
        applyQuote();
        card.classList.remove('fade-out');
        card.classList.add('fade-in');
        document.getElementById('copyBtn').textContent = '📋 Copy';
      }, 350);
    }

    function copyQuote() {
      const q = quotes[quoteIdx];
      const text = `"${q.text}" — ${q.author}`;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✅ Copied!';
        setTimeout(() => { btn.textContent = '📋 Copy'; }, 2000);
      });
    }

    // Load first quote on page open
    nextQuote();
  </script>
</body>
</html>
